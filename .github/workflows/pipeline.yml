name: StreamLens Daily Pipeline

on:
  schedule:
    # Runs every day at 06:00 UTC — data is fresh before US business hours
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions UI (great for demos)

permissions:
  contents: write  # needed to commit parquet files back to the repo

jobs:
  run-pipeline:
    name: Ingest → Transform → Gold
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: uv run python -m streamlens.pipeline

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Commit data parquets to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold/ data/silver_titles.parquet
          git diff --staged --quiet || git commit -m "chore: refresh data $(date +%Y-%m-%d)"
          git push origin HEAD:main
